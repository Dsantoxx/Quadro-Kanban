<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quadro Kanban</title>
<link rel="stylesheet" href="css/estilo.css">
</head>

<body>

<h1>Quadro Kanban</h1>

<div class="kanban">

    <!-- COLUNA A FAZER -->
    <div class="column" data-column="todo">
        <h2>A Fazer</h2>
        <div class="cards" id="todo"></div>

        <button onclick="criarCard('todo')">+ Novo Card</button>
    </div>


    <!-- COLUNA FAZENDO -->
    <div class="column" data-column="doing">
        <h2>Fazendo</h2>
        <div class="cards" id="doing"></div>
    </div>


    <!-- COLUNA CONCLUÍDO -->
    <div class="column" data-column="done">
        <h2>Concluído</h2>
        <div class="cards" id="done"></div>
    </div>

</div>

<script src="js/script.js"></script>
</body>
</html>
