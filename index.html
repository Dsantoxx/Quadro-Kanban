<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quadro Kanban</title>
  <link rel="stylesheet" href="css/estilo.css">
</head>

<body>

  <header>
    <h1>📋 Quadro Kanban</h1>
    <p>Duplo clique para editar · Arraste para mover · X para excluir</p>
  </header>

  <main class="kanban">

    <!-- COLUNA: A FAZER -->
    <div class="column todo" id="col-todo">
      <div class="column-header">
        <h2>A Fazer</h2>
        <span class="contador" id="cnt-todo">0</span>
      </div>
      <div class="cards" id="todo"></div>
      <button class="btn-novo" onclick="criarCard('todo')">+ Novo Card</button>
    </div>

    <!-- COLUNA: FAZENDO -->
    <div class="column doing" id="col-doing">
      <div class="column-header">
        <h2>Fazendo</h2>
        <span class="contador" id="cnt-doing">0</span>
      </div>
      <div class="cards" id="doing"></div>
      <button class="btn-novo" onclick="criarCard('doing')">+ Novo Card</button>
    </div>

    <!-- COLUNA: CONCLUÍDO -->
    <div class="column done" id="col-done">
      <div class="column-header">
        <h2>Concluído</h2>
        <span class="contador" id="cnt-done">0</span>
      </div>
      <div class="cards" id="done"></div>
      <button class="btn-novo" onclick="criarCard('done')">+ Novo Card</button>
    </div>

  </main>

  <!-- MODAL DE CONFIRMAÇÃO DE EXCLUSÃO -->
  <div id="modalExcluir" class="modal">
    <div class="modal-content">
      <p>Deseja excluir este card?</p>
      <button class="btn-confirmar" id="confirmarExcluir">Excluir</button>
      <button class="btn-cancelar" id="cancelarExcluir">Cancelar</button>
    </div>
  </div>

  <script src="js/script.js"></script>

</body>
</html>
